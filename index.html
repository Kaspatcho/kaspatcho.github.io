<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste</title>
    <link rel="stylesheet" href="style.css">
    <script src="js.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="row">
                <label for="linha">Linha: </label>
                <input type="text" name="linha" id="linha">
                <button id="search">Pesquisar</button>
            </div>

            <div class="row">
                <label for="stop">Parada: </label>
                <select name="stop" id="stop"></select>
            </div>

            <div class="row">
                <label for="sentido">Sentido: </label>
                <select name="sentido" id="sentido">
                    <option value="ida">Ida</option>
                    <option value="volta">Volta</option>
                </select>
                <button id="select">Selecionar</button>
            </div>
        </div>

        <div class="card-container"></div>
    </div>
</body>
</html>
